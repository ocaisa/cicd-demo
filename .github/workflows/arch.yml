name: Check architeture EESSI
on: [push, pull_request]

jobs:
  ubuntu-minimal:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-24.04-arm
          - ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
    - uses: eessi/github-action-eessi@v3
    - name: Check arch with EESSI
      run: |
        module load Python
        pip install --user archspec
        archspec cpu
        echo $EESSI_SOFTWARE_SUBDIR
        lscpu
      shell: bash
